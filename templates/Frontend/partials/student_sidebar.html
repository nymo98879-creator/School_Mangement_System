{% load static %}
<aside class="hidden md:flex md:flex-col w-64 shrink-0 bg-white dark:bg-slate-900 border-r border-slate-100 dark:border-slate-800 min-h-screen sticky top-0 p-4 gap-2">
    <div class="flex items-center gap-3 px-2 py-3 mb-4">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center text-white shadow-lg">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <div>
            <div class="font-bold text-slate-900 dark:text-white leading-tight">Student Portal</div>
            <div class="text-xs text-slate-500 dark:text-slate-400">University Info</div>
        </div>
    </div>

    <nav class="flex flex-col gap-1">
        <a href="{% url 'students:student_dashboard' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors font-medium">
            <i class="fas fa-border-all w-5 text-center"></i> Dashboard
        </a>
        <a href="{% url 'students:university_info' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-50 dark:bg-blue-500/10 text-blue-700 dark:text-blue-300 font-semibold transition-colors">

        </a>
        <a href="{% url 'students:student_register_success' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors font-medium">

        </a>
    </nav>

    <div class="mt-auto pt-4">
        <a href="{% url 'accounts:logout' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-500 dark:text-slate-400 hover:bg-red-50 dark:hover:bg-red-500/10 hover:text-red-600 dark:hover:text-red-400 transition-colors font-medium">
